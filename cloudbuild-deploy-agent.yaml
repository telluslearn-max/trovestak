substitutions:
  _IMAGE: us-central1-docker.pkg.dev/trovestak/trovestak-repo/agent-service:latest

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - -t
      - $_IMAGE
      - -f
      - apps/agent-service/Dockerfile
      - .

  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - $_IMAGE

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - agent-service
      - --image=$_IMAGE
      - --region=us-central1
      - --project=trovestak
      - --allow-unauthenticated
      - --port=8080

images:
  - $_IMAGE

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
