# ============================================================
# Trovestak API Gateway — nginx.conf
# Deployed as a Cloud Run container (single public endpoint)
#
# Rate limiting: limit_req_zone uses client IP — works across
# all Cloud Run instances (unlike the storefront's in-memory Map).
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time rid=$http_x_request_id';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Payment endpoint: 5 requests/minute per IP (replaces in-memory Map in storefront)
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=5r/m;

    # General API: 300 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

    # Admin endpoints: 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=60r/m;

    limit_req_status 429;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream storefront {
        server ${STOREFRONT_HOST}:${STOREFRONT_PORT};
        keepalive 32;
    }

    upstream order_service {
        server ${ORDER_SERVICE_HOST}:${ORDER_SERVICE_PORT};
        keepalive 16;
    }

    upstream catalog_service {
        server ${CATALOG_SERVICE_HOST}:${CATALOG_SERVICE_PORT};
        keepalive 16;
    }

    upstream agent_service {
        server ${AGENT_SERVICE_HOST}:${AGENT_SERVICE_PORT};
        keepalive 8;
    }

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # Inject request ID for distributed tracing
        set $request_id_val $http_x_request_id;
        if ($request_id_val = '') {
            set $request_id_val $request_id;
        }
        add_header X-Request-ID $request_id_val always;

        # ── Payment endpoints (strict rate limit) ─────────────────────────────
        location = /api/orders/checkout {
            limit_req zone=payment_limit burst=2 nodelay;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id_val;
            proxy_read_timeout 30s;
        }

        # ── Order service ─────────────────────────────────────────────────────
        location /api/orders/ {
            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api/orders/(.*) /$1 break;
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id_val;
            proxy_read_timeout 30s;
        }

        # ── Catalog service (admin mutations) ─────────────────────────────────
        location /api/catalog/ {
            limit_req zone=admin_limit burst=10 nodelay;
            rewrite ^/api/catalog/(.*) /$1 break;
            proxy_pass http://catalog_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id_val;
            proxy_read_timeout 60s;
        }

        # ── Agent service (WebSocket upgrade) ────────────────────────────────
        location /api/agent/ {
            limit_req zone=api_limit burst=10 nodelay;
            rewrite ^/api/agent/(.*) /$1 break;
            proxy_pass http://agent_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id_val;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Storefront (catch-all) ────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://storefront;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id_val;
            proxy_read_timeout 30s;
            proxy_buffering off;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"Too many requests. Please wait and try again."}';
        }

        error_page 502 503 504 @upstream_error;
        location @upstream_error {
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable."}';
        }
    }
}
