substitutions:
  _IMAGE: us-central1-docker.pkg.dev/trovestak/trovestak-repo/storefront:latest
  _SUPABASE_URL: https://lgxqlgyciazmlllowhel.supabase.co
  _APP_URL: https://trovestak.com
  _AGENT_WS_URL: wss://agent-service-d6zoalodha-uc.a.run.app

availableSecrets:
  secretManager:
    - versionName: projects/trovestak/secrets/SUPABASE_ANON_KEY/versions/latest
      env: SUPABASE_ANON_KEY
    - versionName: projects/trovestak/secrets/GEMINI_API_KEY/versions/latest
      env: GEMINI_API_KEY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    entrypoint: 'bash'
    secretEnv: ['SUPABASE_ANON_KEY', 'GEMINI_API_KEY']
    args:
      - '-c'
      - |
        docker build \
          -t $_IMAGE \
          -f apps/storefront/Dockerfile \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=$_SUPABASE_URL \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$$SUPABASE_ANON_KEY \
          --build-arg NEXT_PUBLIC_APP_URL=$_APP_URL \
          --build-arg NEXT_PUBLIC_AGENT_WS_URL=$_AGENT_WS_URL \
          --build-arg NEXT_PUBLIC_GEMINI_API_KEY=$$GEMINI_API_KEY \
          .

  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - $_IMAGE

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - storefront
      - --image=$_IMAGE
      - --region=us-central1
      - --project=trovestak
      - --allow-unauthenticated
      - --set-env-vars=NEXT_PUBLIC_SUPABASE_URL=$_SUPABASE_URL,NEXT_PUBLIC_APP_URL=$_APP_URL,NEXT_PUBLIC_AGENT_WS_URL=$_AGENT_WS_URL
      - --update-secrets=NEXT_PUBLIC_SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,NEXT_PUBLIC_GEMINI_API_KEY=GEMINI_API_KEY:latest

images:
  - $_IMAGE

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY
